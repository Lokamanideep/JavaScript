<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cont">
    <form onsubmit="Validateform(event)">
        <h1>Login Form</h1>
        <h3>Name :<input type="text" placeholder="Enter name" name="username"> </h3>
        <h3>Email :<input type="email" placeholder="Enter Email" name="email"> </h3>
        <h3>Age :<input type="number" placeholder="Enter Age" name="age"> </h3>
        <h3>Gender:
            <input type="radio" name="Gender" value="Male">Male
            <input type="radio" name="Gender" value="Female">Female
        </h3>
        <h3>Password :<input type="password" placeholder="Enter password" name="password"> </h3>
        <h3>Confirm Password :<input type="password" placeholder="Confirm Password" name="confirmPassword"> </h3>
        <p id="error"></p>
        <button type="submit">Submit</button>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
